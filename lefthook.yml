pre-commit:
  parallel: true
  jobs:
    - run: bun ultracite fix {staged_files}
      glob: "**/*.{js,jsx,ts,tsx,json,jsonc,css}"

    - run: bun v8r {staged_files}
      glob: "**/*.{yml,yaml}"

    - run: bunx tsgo --noEmit
      glob: "**/*.{ts,tsx}"

    - run: bun run scripts/cleanup.ts

    - run: bun scripts/sync-jsr-version.ts && git diff --exit-code deno.json
      glob: "package.json"
      fail_text: "deno.json is out of sync with package.json — stage the updated deno.json and retry"
