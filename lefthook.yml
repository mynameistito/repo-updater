pre-commit:
  parallel: false
  jobs:
    - run: bun ultracite fix {staged_files}
      glob: "**/*.{js,jsx,ts,tsx,json,jsonc,css}"

    - run: bun v8r {staged_files}
      glob: "**/*.{yml,yaml}"

    - run: bunx tsgo --noEmit
      glob: "**/*.{ts,tsx}"
      root: packages/repo-updater

    - name: cleanup
      run: bun packages/repo-updater/scripts/cleanup.ts

    - name: sync-jsr
      run: bun run sync:jsr && git add packages/repo-updater/deno.json
      glob: "packages/repo-updater/package.json"
