name: Question
description: Ask a question about usage, configuration, or behavior.
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Before asking, check the [README](../../blob/main/README.md) and open issues — your question may already be answered.

  - type: textarea
    id: question
    attributes:
      label: What do you want to know?
      description: Be as specific as possible. Vague questions are hard to answer well.
      placeholder: |
        How do I configure the tool to skip a specific repo in my config file
        when running in CI without removing it from the list permanently?
    validations:
      required: true

  - type: textarea
    id: tried
    attributes:
      label: What have you already tried?
      description: Describe what you attempted, including any flags, config options, or docs you consulted.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: repo-updater version
      placeholder: "0.2.2"
    validations:
      required: true

  - type: dropdown
    id: runtime
    attributes:
      label: Runtime
      options:
        - Bun
        - Node.js
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Config snippets, terminal output, or anything else that helps clarify your setup.
