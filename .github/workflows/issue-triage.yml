name: Issue Triage

on:
  issues:
    types: [opened]

permissions:
  issues: write
  contents: read

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Parse CODEOWNERS for default owner
        id: owner
        run: |
          OWNER=$(grep -E '^\*\s+' .github/CODEOWNERS | awk '{print $2}' | sed 's/@//')
          if [ -z "$OWNER" ]; then
            echo "::error::Could not determine CODEOWNER from .github/CODEOWNERS"
            exit 1
          fi
          echo "username=$OWNER" >> $GITHUB_OUTPUT

      - name: Add triage label if no labels present
        if: ${{ toJson(github.event.issue.labels) == '[]' }}
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['triage']
            })

      - name: Assign CODEOWNER to issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              assignees: ['${{ steps.owner.outputs.username }}']
            })
