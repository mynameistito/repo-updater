name: Stale

on:
  schedule:
    - cron: "30 8 * * 1"

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Mark and close stale issues and PRs
    runs-on: ubuntu-latest

    steps:
      - name: Stale
        uses: actions/stale@b5d41d4e1d5dceea10e7104786b73624c18a190f # v10.2.0
        with:
          # Issues
          days-before-issue-stale: 60
          days-before-issue-close: 14
          stale-issue-label: "stale"
          close-issue-label: "wontfix"
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not had
            any activity in the last 60 days. It will be closed in 14 days if no
            further activity occurs. If this issue is still relevant, please leave a
            comment or remove the "stale" label. Thank you for your contributions!
          close-issue-message: >
            This issue has been closed automatically because it remained stale for
            14 days with no further activity. Feel free to reopen if the issue
            is still relevant.

          # Pull Requests
          days-before-pr-stale: 30
          days-before-pr-close: 7
          stale-pr-label: "stale"
          close-pr-label: "wontfix"
          stale-pr-message: >
            This pull request has been automatically marked as stale because it has
            not had any activity in the last 30 days. It will be closed in 7 days
            if no further activity occurs. If this PR is still relevant, please
            rebase it or leave a comment to let us know. Thank you!
          close-pr-message: >
            This pull request has been closed automatically because it remained
            stale for 7 days with no further activity. Feel free to reopen and
            update it if you would like to continue the work.

          # Exemptions
          exempt-issue-labels: "pinned,security,bug"
          exempt-pr-labels: "pinned,security,bug"

          # Behavior controls
          remove-stale-when-updated: true
          operations-per-run: 100
