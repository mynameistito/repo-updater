dependencies:
  - changed-files:
      - any-glob-to-any-file:
          - "package.json"
          - "package-lock.json"
          - "bun.lock"
          - "bunfig.toml"
          - "pnpm-lock.yaml"
          - "yarn.lock"

ci:
  - changed-files:
      - any-glob-to-any-file:
          - ".github/workflows/**"

github-config:
  - changed-files:
      - any-glob-to-any-file:
          - ".github/ISSUE_TEMPLATE/**"
          - ".github/PULL_REQUEST_TEMPLATE.md"
          - ".github/labeler.yml"
          - ".github/settings.yml"

source:
  - changed-files:
      - any-glob-to-any-file:
          - "src/**"

tests:
  - changed-files:
      - any-glob-to-any-file:
          - "__tests__/**"
          - "vitest.config.ts"
          - "**/*.test.ts"
          - "**/*.spec.ts"

documentation:
  - changed-files:
      - any-glob-to-any-file:
          - "README.md"
          - "CHANGELOG.md"
          - "CONTRIBUTING.md"
          - "CODE_OF_CONDUCT.md"
          - "SECURITY.md"
          - "docs/**"

configuration:
  - changed-files:
      - any-glob-to-any-file:
          - "tsconfig*.json"
          - "biome.jsonc"
          - "lefthook.yml"

scripts:
  - changed-files:
      - any-glob-to-any-file:
          - "scripts/**"

changeset:
  - changed-files:
      - any-glob-to-any-file:
          - ".changeset/**"
